name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run E2E smoke tests (requires API key secret)"
        required: false
        default: "false"
        type: boolean

jobs:
  # ── Unit Tests ──────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  # ── E2E Smoke Tests ────────────────────────────────────────────────────────
  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.run_e2e == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install pi
        run: npm install -g @earendil-works/pi-coding-agent

      - name: Run E2E smoke tests
        env:
          CLINE_API_KEY: ${{ secrets.CLINE_API_KEY }}
        run: bash tests/e2e/smoke.sh
